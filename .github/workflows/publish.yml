name: Publish Release

# macOS-only publish. Matrix produces:
#   - macOS aarch64 DMG + .app.tar.gz updater artifact
#   - macOS x86_64 DMG + .app.tar.gz updater artifact
# tauri-action@v0.6 merges each runner's per-platform entry into the same
# latest.json on the release.

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  # One publish per tag ref at a time. tauri-action merges latest.json
  # atomically across matrix entries so concurrent matrix jobs within one
  # workflow run are fine — we just want to reject retries of the same tag
  # racing with the original run.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: true

jobs:
  preflight:
    name: Release Preflight
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_body: ${{ steps.notes.outputs.release_body }}
      draft: ${{ steps.release-mode.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Verify release config
        run: |
          bun run release:verify
          test -n "${HELMOR_UPDATER_PUBKEY}"
          test -n "${HELMOR_UPDATER_ENDPOINTS}"
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
        env:
          HELMOR_UPDATER_PUBKEY: ${{ secrets.HELMOR_UPDATER_PUBKEY }}
          HELMOR_UPDATER_ENDPOINTS: ${{ secrets.HELMOR_UPDATER_ENDPOINTS }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Read version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag matches app version
        if: github.ref_type == 'tag'
        run: |
          expected="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version ${expected}"
            exit 1
          fi

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'release_body<<EOF'
            bun run release:notes -- "${{ steps.version.outputs.version }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release mode
        id: release-mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    name: Build and Publish (${{ matrix.target-triple }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-triple: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin"
          - target-triple: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Add Rust target for Intel macOS cross-build
        if: matrix.target-triple == 'x86_64-apple-darwin'
        shell: bash
        run: rustup target add x86_64-apple-darwin

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build + stage sidecar
        uses: ./.github/actions/build-sidecar
        with:
          target-triple: ${{ matrix.target-triple }}

      - name: Prepare macOS signing keychain
        id: signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          OUTPUT_FORMAT: github
        run: |
          chmod +x scripts/prepare-macos-signing.sh scripts/cleanup-macos-signing.sh
          scripts/prepare-macos-signing.sh >> "$GITHUB_OUTPUT"

      - name: Build and publish (${{ matrix.target-triple }})
        id: tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_KEYCHAIN_PATH: ${{ steps.signing.outputs.APPLE_KEYCHAIN_PATH }}
          APPLE_KEYCHAIN_PASSWORD: ${{ steps.signing.outputs.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HELMOR_UPDATER_PUBKEY: ${{ secrets.HELMOR_UPDATER_PUBKEY }}
          HELMOR_UPDATER_ENDPOINTS: ${{ secrets.HELMOR_UPDATER_ENDPOINTS }}
        with:
          tagName: v__VERSION__
          releaseName: Helmor v__VERSION__
          releaseBody: ${{ needs.preflight.outputs.release_body }}
          releaseDraft: ${{ needs.preflight.outputs.draft == 'true' }}
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.tauri-args }}
          # Force tauri-action to use bun instead of auto-detecting (it only knows npm/yarn/pnpm)
          tauriScript: bun run tauri

      - name: Cleanup macOS signing keychain
        if: always()
        run: |
          if [ -n "${{ steps.signing.outputs.APPLE_KEYCHAIN_PATH }}" ]; then
            scripts/cleanup-macos-signing.sh "${{ steps.signing.outputs.APPLE_KEYCHAIN_PATH }}"
          fi

  bump-homebrew-tap:
    name: Bump Homebrew Cask
    needs: [preflight, build-and-publish]
    # Only run for real (non-draft) tag pushes. workflow_dispatch defaults to
    # draft=true and draft releases can't be downloaded via the .../v{tag}/
    # URL shape we pin in the cask.
    if: |
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      needs.preflight.outputs.draft == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Guard on tap token availability
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not configured — skipping tap bump."
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Checkout homebrew-helmor tap
        if: env.SKIP != '1'
        uses: actions/checkout@v6
        with:
          repository: dohooo/homebrew-helmor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download DMGs and compute SHA256
        if: env.SKIP != '1'
        id: sha
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          BASE="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          # Retry a few times — release assets sometimes take a second to propagate
          # to the download CDN even though the upload step finished.
          for arch in aarch64 x64; do
            for attempt in 1 2 3 4 5; do
              if curl -fsSL -o "${arch}.dmg" "${BASE}/Helmor_${VERSION}_${arch}.dmg"; then
                break
              fi
              echo "download attempt ${attempt} for ${arch} failed; sleeping"
              sleep $(( attempt * 5 ))
            done
            test -s "${arch}.dmg"
          done
          ARM_SHA=$(sha256sum aarch64.dmg | awk '{print $1}')
          X64_SHA=$(sha256sum x64.dmg | awk '{print $1}')
          echo "arm=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel=${X64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update cask
        if: env.SKIP != '1'
        working-directory: tap
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm }}
          X64_SHA: ${{ steps.sha.outputs.intel }}
        run: |
          python3 scripts/update-cask.py "${VERSION}" "${ARM_SHA}" "${X64_SHA}"

      - name: Commit and push
        if: env.SKIP != '1'
        working-directory: tap
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          if git diff --quiet -- Casks/helmor.rb; then
            echo "cask already at ${VERSION} — nothing to push"
            exit 0
          fi
          git config user.name "helmor-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add Casks/helmor.rb
          git commit -m "helmor ${VERSION}"
          git push
