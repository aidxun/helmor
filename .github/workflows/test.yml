name: Test

# macOS-only quality suite. Windows and Linux no longer run unit / sidecar /
# frontend tests — they're gated by a compile-only job in quality.yml
# (Rust Windows/Linux Check) so we still catch cross-platform source
# regressions, but day-to-day test signal comes from the primary target
# (macOS) where the app actually ships.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  frontend-test:
    name: Frontend Test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run frontend tests
        run: bun run test:frontend

  sidecar-test:
    name: Sidecar Test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Run sidecar tests
        shell: bash
        run: bun run test:sidecar

  rust-test:
    name: Rust Test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Build sidecar binary
        uses: ./.github/actions/build-sidecar
        with:
          target-triple: aarch64-apple-darwin

      - name: Run Rust tests with nextest
        shell: bash
        run: cd src-tauri && cargo nextest run

      - name: Run Rust doctests
        shell: bash
        run: cd src-tauri && cargo test --doc

  e2e-test:
    name: E2E Test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      # Cache the WebKit bundle (~90MB) so cold runs aren't gated on the
      # Playwright CDN. Keyed on bun.lock so a `@playwright/test` bump busts
      # the cache automatically — under-specifying the key risks booting with
      # a mismatched browser after a version bump.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright WebKit
        shell: bash
        run: bunx playwright install webkit

      - name: Run E2E tests
        shell: bash
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
